version: "3.9"

# ─── Shared network ───────────────────────────────────────────────────────────
networks:
  ai-nids-net:
    driver: bridge

# ─── Persistent volumes ───────────────────────────────────────────────────────
volumes:
  es-data:
  kibana-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── 1. Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ai-nids-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ai-nids-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── 2. Logstash ─────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: ai-nids-logstash
    volumes:
      - ./logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP input
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ai-nids-net

  # ── 3. Kibana ───────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ai-nids-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana-data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ai-nids-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  # ── 4. ElastAlert2 ──────────────────────────────────────────────────────────
  elastalert:
    image: jertel/elastalert2:2.16.0
    container_name: ai-nids-elastalert
    volumes:
      - ./elastalert/rules:/opt/elastalert/rules:ro
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ai-nids-net

  # ── 5. Redis (feature cache & job queue) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ai-nids-redis
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - ai-nids-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── 6. Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ai-nids-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ai-nids-net

  # ── 7. Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: ai-nids-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ai-nids-net

input {
  # From FastAPI (JSON over TCP)
  tcp {
    port => 5000
    codec => json_lines
    tags => ["ai-nids", "tcp"]
  }

  # From Filebeat / network agents
  beats {
    port => 5044
    tags => ["ai-nids", "beats"]
  }
}

filter {
  # Parse timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # GeoIP enrichment on source IP
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "src_geoip"
      fields => ["city_name", "country_name", "location"]
    }
  }

  # Severity colour mapping for Kibana
  if [severity] == "CRITICAL" {
    mutate { add_field => { "severity_level" => 5 } }
  } else if [severity] == "HIGH" {
    mutate { add_field => { "severity_level" => 4 } }
  } else if [severity] == "MEDIUM" {
    mutate { add_field => { "severity_level" => 3 } }
  } else if [severity] == "LOW" {
    mutate { add_field => { "severity_level" => 2 } }
  } else {
    mutate { add_field => { "severity_level" => 1 } }
  }

  # Tag anomalies
  if [ae_score] {
    ruby {
      code => "event.set('is_anomaly', event.get('ae_score').to_f > 0.05)"
    }
  }

  # Remove internal fields
  mutate {
    remove_field => ["host", "agent", "ecs", "log"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "ai-nids-alerts-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug stdout (disable in production)
  # stdout { codec => rubydebug }
}
